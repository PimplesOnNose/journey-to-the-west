<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西游记 — Journey to the West</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+SC:wght@300;400;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Atmospheric layers -->
    <div class="atmosphere">
        <div class="mist mist-1"></div>
        <div class="mist mist-2"></div>
        <div class="mist mist-3"></div>
    </div>

    <!-- Main container -->
    <main class="canvas">
        <!-- Illustration layer -->
        <div class="illustration-layer">
            <img id="storyImage" src="images/page1.jpg" alt="" class="illustration">
            <div class="illustration-vignette"></div>
        </div>

        <!-- Story scroll -->
        <div class="scroll-container">
            <div class="scroll">
                <div class="scroll-edge scroll-edge-top"></div>
                <div class="scroll-content">
                    <!-- Page indicator -->
                    <div class="page-mark">
                        <span class="page-mark-number" id="currentPage">1</span>
                        <span class="page-mark-divider">·</span>
                        <span class="page-mark-total">10</span>
                    </div>

                    <!-- Title -->
                    <header class="story-header">
                        <h1 class="story-title" id="storyTitle">The Monkey King is Born</h1>
                        <p class="story-pinyin" id="storyTitlePinyin">Měi Hóu Wáng Chū Shì</p>
                    </header>

                    <!-- Decorative divider -->
                    <div class="divider">
                        <span class="divider-ornament">❋</span>
                    </div>

                    <!-- Content pinyin -->
                    <div class="content-pinyin" id="contentPinyinContainer">
                        <p id="storyContentPinyin"></p>
                    </div>

                    <!-- Story text -->
                    <article class="story-body">
                        <p id="storyText" class="story-paragraph">Long ago, on the Mountain of Flowers and Fruit, a magical stone cracked open and out jumped a little monkey.</p>
                    </article>
                </div>
                <div class="scroll-edge scroll-edge-bottom"></div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="navigation">
            <button id="prevBtn" class="nav-arrow nav-prev" aria-label="Previous" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <button id="nextBtn" class="nav-arrow nav-next" aria-label="Next">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 5l7 7-7 7"/>
                </svg>
            </button>
        </nav>

        <!-- Audio & Language controls -->
        <div class="controls">
            <!-- Language switch -->
            <div class="lang-switch">
                <button id="langEn" class="lang-btn active" data-lang="en">EN</button>
                <button id="langZh" class="lang-btn" data-lang="zh">中文</button>
            </div>

            <!-- Audio controls -->
            <div class="audio-controls">
                <button id="playBtn" class="play-btn" aria-label="Play">
                    <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>
                <div class="audio-progress">
                    <div class="progress-track">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>
                <button id="autoPlayBtn" class="auto-btn" aria-label="Auto play">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M5 3l14 9-14 9V3z"/>
                        <path d="M19 3v18"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Credits -->
        <footer class="credits">
            <span> crafted with </span>
            <a href="https://pi.dev" target="_blank" rel="noopener">Pi</a>
            <span class="credits-dot">·</span>
            <a href="https://mimo.mi.com/" target="_blank" rel="noopener">Mimo</a>
        </footer>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
