<!DOCTYPE html>
<html>
<head>
    <title>Functional Pinyin Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .loading { background-color: #fff3cd; border-color: #ffeeba; }
        #results { white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Functional Pinyin Test</h1>
    
    <div class="test loading">
        <h3>Test Results</h3>
        <div id="results">Running tests...</div>
    </div>
    
    <script>
        const results = [];
        let testCount = 0;
        let passedCount = 0;
        
        function addResult(test, passed, message) {
            testCount++;
            if (passed) passedCount++;
            results.push(`${passed ? '✅' : '❌'} ${test}: ${message}`);
            updateDisplay();
        }
        
        function updateDisplay() {
            const resultsDiv = document.getElementById('results');
            const testDiv = resultsDiv.parentElement;
            
            resultsDiv.innerHTML = results.join('\n');
            
            if (testCount > 0) {
                if (passedCount === testCount) {
                    testDiv.className = 'test success';
                    resultsDiv.innerHTML += `\n\n🎉 All ${testCount} tests passed!`;
                } else {
                    testDiv.className = 'test error';
                    resultsDiv.innerHTML += `\n\n⚠️ ${passedCount}/${testCount} tests passed`;
                }
            }
        }
        
        // Test 1: Check if story.json has pinyin data
        fetch('story.json')
            .then(response => response.json())
            .then(data => {
                const hasPinyin = data.pages.every(page => 
                    page.content.pinyin && 
                    page.content.pinyin.length > 0
                );
                addResult('Story Data', hasPinyin, 
                    hasPinyin ? 'All pages have pinyin data' : 'Some pages missing pinyin data');
                
                // Test 2: Check if first page has correct pinyin structure
                const firstPage = data.pages[0];
                const hasCorrectStructure = 
                    firstPage.title.pinyin && 
                    firstPage.content.pinyin &&
                    firstPage.content.pinyin.includes('Hěn jiǔ yǐ qián');
                addResult('Pinyin Structure', hasCorrectStructure,
                    hasCorrectStructure ? 'First page has correct pinyin structure' : 'First page pinyin structure incorrect');
            })
            .catch(error => {
                addResult('Story Data', false, 'Failed to load story.json: ' + error.message);
            });
        
        // Test 3: Check if HTML has pinyin containers
        fetch('index.html')
            .then(response => response.text())
            .then(html => {
                const hasTitlePinyin = html.includes('titlePinyinContainer');
                const hasContentPinyin = html.includes('contentPinyinContainer');
                addResult('HTML Structure', hasTitlePinyin && hasContentPinyin,
                    hasTitlePinyin && hasContentPinyin ? 
                    'Both title and content pinyin containers found' : 
                    'Missing pinyin containers in HTML');
            })
            .catch(error => {
                addResult('HTML Structure', false, 'Failed to load index.html: ' + error.message);
            });
        
        // Test 4: Check if JavaScript handles pinyin
        fetch('js/app.js')
            .then(response => response.text())
            .then(js => {
                const handlesTitlePinyin = js.includes('storyTitlePinyin');
                const handlesContentPinyin = js.includes('storyContentPinyin');
                addResult('JavaScript', handlesTitlePinyin && handlesContentPinyin,
                    handlesTitlePinyin && handlesContentPinyin ?
                    'JavaScript handles both title and content pinyin' :
                    'JavaScript missing pinyin handling');
            })
            .catch(error => {
                addResult('JavaScript', false, 'Failed to load app.js: ' + error.message);
            });
        
        // Test 5: Check if CSS has pinyin styles
        fetch('css/style.css')
            .then(response => response.text())
            .then(css => {
                const hasTitleStyle = css.includes('.pinyin-container');
                const hasContentStyle = css.includes('.content-pinyin-container');
                addResult('CSS Styles', hasTitleStyle && hasContentStyle,
                    hasTitleStyle && hasContentStyle ?
                    'Both title and content pinyin styles found' :
                    'Missing pinyin styles in CSS');
            })
            .catch(error => {
                addResult('CSS Styles', false, 'Failed to load style.css: ' + error.message);
            });
    </script>
</body>
</html>
